litellm_settings:
  callbacks: ["token_refresher.BedrockTokenRefresher"]

model_list:
  - model_name: deepseek-v3.2
    litellm_params:
      model: bedrock_mantle/deepseek.v3.2
      api_base: "os.environ/BEDROCK_MANTLE_API_BASE"
      max_tokens: 32768

  - model_name: nemotron-nano-30b
    litellm_params:
      model: bedrock_mantle/nvidia.nemotron-nano-3-30b
      api_base: "os.environ/BEDROCK_MANTLE_API_BASE"
      max_tokens: 32768

  - model_name: ministral-3b
    litellm_params:
      model: bedrock_mantle/mistral.ministral-3-3b-instruct
      api_base: "os.environ/BEDROCK_MANTLE_API_BASE"
      max_tokens: 8192

  - model_name: ministral-8b
    litellm_params:
      model: bedrock_mantle/mistral.ministral-3-8b-instruct
      api_base: "os.environ/BEDROCK_MANTLE_API_BASE"
      max_tokens: 8192

  - model_name: ministral-14b
    litellm_params:
      model: bedrock_mantle/mistral.ministral-3-14b-instruct
      api_base: "os.environ/BEDROCK_MANTLE_API_BASE"
      max_tokens: 8192

  - model_name: qwen3-235b
    litellm_params:
      model: bedrock_mantle/qwen.qwen3-235b-a22b-2507
      api_base: "os.environ/BEDROCK_MANTLE_API_BASE"
      max_tokens: 32768

  - model_name: qwen3-next-80b
    litellm_params:
      model: bedrock_mantle/qwen.qwen3-next-80b-a3b-instruct
      api_base: "os.environ/BEDROCK_MANTLE_API_BASE"
      max_tokens: 32768

  - model_name: qwen3-coder-480b
    litellm_params:
      model: bedrock_mantle/qwen.qwen3-coder-480b-a35b-instruct
      api_base: "os.environ/BEDROCK_MANTLE_API_BASE"
      max_tokens: 16384

  - model_name: mistral-large-3
    litellm_params:
      model: bedrock_mantle/mistral.mistral-large-3-675b-instruct
      api_base: "os.environ/BEDROCK_MANTLE_API_BASE"
      max_tokens: 32768

  - model_name: deepseek-v3.1
    litellm_params:
      model: bedrock_mantle/deepseek.v3.1
      api_base: "os.environ/BEDROCK_MANTLE_API_BASE"
      max_tokens: 32768

  - model_name: kimi-k2.5
    litellm_params:
      model: bedrock_mantle/moonshotai.kimi-k2.5
      api_base: "os.environ/BEDROCK_MANTLE_API_BASE"
      max_tokens: 32768

  - model_name: elephant-alpha
    litellm_params:
      model: openrouter/openrouter/elephant-alpha
      api_base: "https://openrouter.ai/api/v1"
      api_key: "os.environ/OPENROUTER_API_KEY"
      extra_headers:
        HTTP-Referer: "https://github.com/Jeshii/claw-bedrock"
        X-OpenRouter-Title: "claw-bedrock"
